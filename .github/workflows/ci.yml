name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run qexec Bash tests
        run: bats qexec/tests

      - name: Python compile checks
        run: python -m py_compile fmriprep/*.py qexec/*.py

      - name: fMRIPrep backend tests
        run: python -m unittest discover -s fmriprep/tests -p 'test_*.py'

      - name: XNAT CLI smoke test
        run: Rscript xnat_cli/xnat_cli.R help
